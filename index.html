<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work in Progress</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f13;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #e2e8f0;
      overflow: hidden;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 40%, rgba(99, 102, 241, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 60%, rgba(236, 72, 153, 0.1) 0%, transparent 60%);
      pointer-events: none;
    }

    .container {
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .icon {
      font-size: 4rem;
      display: block;
      margin-bottom: 1.5rem;
      animation: spin 8s linear infinite;
    }

    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .badge {
      display: inline-block;
      background: rgba(99, 102, 241, 0.15);
      border: 1px solid rgba(99, 102, 241, 0.4);
      color: #a5b4fc;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.35em 0.9em;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      background: linear-gradient(135deg, #e2e8f0 0%, #a5b4fc 50%, #f472b6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.05rem;
      color: #94a3b8;
      max-width: 38ch;
      margin: 0 auto 2.5rem;
      line-height: 1.6;
    }

    .progress-track {
      width: min(360px, 80vw);
      margin: 0 auto 2rem;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #64748b;
      margin-bottom: 0.5rem;
    }

    .progress-bar {
      height: 6px;
      background: rgba(255,255,255,0.07);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6366f1, #ec4899);
      border-radius: 999px;
      animation: fill 3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes fill {
      0%   { width: 0%; }
      100% { width: 68%; }
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 2rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(99, 102, 241, 0.4);
      animation: pulse 1.4s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40%            { opacity: 1;   transform: scale(1.2); }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="container">
    <span class="icon">&#9881;</span>
    <div class="badge">Under Construction</div>
    <h1>Work in Progress</h1>
    <p>Something great is being built here. Check back soon — we're putting the finishing touches on it.</p>

    <div class="progress-track">
      <div class="progress-label">
        <span>Progress</span>
        <span>68%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
    </div>

    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
